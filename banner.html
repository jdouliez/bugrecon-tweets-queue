<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1500px; height: 500px; background: #0a061a; }
  html { overflow: hidden; }
  body {
    display: block;
    border: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: radial-gradient(ellipse at 78% 50%, #2a1758 0%, #14092e 45%, #0a061a 100%);
    color: #e9e6ff;
    overflow: hidden;
    position: relative;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(168, 132, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168, 132, 255, 0.06) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at 78% 50%, black 25%, transparent 75%);
  }
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,0.012) 3px 4px);
    pointer-events: none;
  }
  .glow {
    position: absolute;
    top: 50%; left: 78%;
    width: 700px; height: 700px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(155, 88, 255, 0.30) 0%, transparent 60%);
    filter: blur(40px);
  }
  /* Radar visual on the right */
  .radar {
    position: absolute;
    top: 50%; right: 110px;
    transform: translateY(-50%);
    width: 360px; height: 360px;
    z-index: 4;
  }
  .content {
    position: relative;
    z-index: 5;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 540px 60px 460px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 22px;
    margin-bottom: 26px;
  }
  .shield {
    width: 76px; height: 76px;
    border-radius: 20px;
    background: linear-gradient(135deg, #b07cff 0%, #6a3aff 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 50px rgba(155, 88, 255, 0.55), 0 0 0 1px rgba(255,255,255,0.1) inset;
  }
  .shield svg { width: 40px; height: 40px; }
  .wordmark {
    font-size: 60px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    color: #ffffff;
  }
  .wordmark span { color: #b07cff; }
  .headline {
    font-size: 38px;
    font-weight: 700;
    line-height: 1.18;
    letter-spacing: -0.015em;
    color: #ffffff;
    margin-bottom: 22px;
  }
  .headline em {
    font-style: normal;
    color: #b07cff;
  }
  .props {
    display: flex;
    gap: 28px;
    align-items: center;
    font-size: 19px;
    font-weight: 500;
    color: #c8c0e6;
    margin-bottom: 26px;
    flex-wrap: wrap;
  }
  .props .dot {
    width: 4px; height: 4px;
    background: #6a3aff;
    border-radius: 50%;
  }
  .footer {
    display: flex;
    align-items: center;
    gap: 18px;
    font-size: 17px;
    color: #9c91c4;
  }
  .footer .url {
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    background: rgba(168, 132, 255, 0.10);
    border: 1px solid rgba(168, 132, 255, 0.25);
    padding: 8px 14px;
    border-radius: 8px;
    color: #d4ccf0;
    font-size: 15px;
  }
  .tagline {
    font-style: italic;
    color: #b07cff;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="scanlines"></div>

  <!-- Recon radar SVG -->
  <svg class="radar" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="sweep" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#b07cff" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#b07cff" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#b07cff" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#6a3aff" stop-opacity="0.15"/>
      </linearGradient>
    </defs>
    <!-- concentric rings -->
    <circle cx="180" cy="180" r="170" fill="none" stroke="url(#ring)" stroke-width="1"/>
    <circle cx="180" cy="180" r="135" fill="none" stroke="rgba(176,124,255,0.30)" stroke-width="1"/>
    <circle cx="180" cy="180" r="100" fill="none" stroke="rgba(176,124,255,0.40)" stroke-width="1"/>
    <circle cx="180" cy="180" r="65"  fill="none" stroke="rgba(176,124,255,0.55)" stroke-width="1"/>
    <circle cx="180" cy="180" r="30"  fill="none" stroke="rgba(176,124,255,0.7)"  stroke-width="1"/>
    <!-- crosshair -->
    <line x1="180" y1="0" x2="180" y2="360" stroke="rgba(176,124,255,0.18)" stroke-width="1"/>
    <line x1="0" y1="180" x2="360" y2="180" stroke="rgba(176,124,255,0.18)" stroke-width="1"/>
    <!-- sweep wedge (40deg) -->
    <path d="M180,180 L350,180 A170,170 0 0,0 314,77 Z" fill="url(#sweep)"/>
    <!-- detected blips -->
    <circle cx="245" cy="120" r="5" fill="#fff"/>
    <circle cx="245" cy="120" r="11" fill="#fff" fill-opacity="0.18"/>
    <circle cx="120" cy="220" r="4" fill="#b07cff"/>
    <circle cx="120" cy="220" r="9" fill="#b07cff" fill-opacity="0.25"/>
    <circle cx="260" cy="245" r="4" fill="#b07cff"/>
    <circle cx="260" cy="245" r="9" fill="#b07cff" fill-opacity="0.20"/>
    <circle cx="95"  cy="135" r="3" fill="#fff" fill-opacity="0.7"/>
    <!-- center -->
    <circle cx="180" cy="180" r="4" fill="#fff"/>
  </svg>

  <div class="content">
    <div class="brand">
      <div class="shield">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z" fill="#fff" opacity="0.95"/>
          <path d="M9 12l2 2 4-4" stroke="#6a3aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="wordmark">Bug<span>Recon</span></div>
    </div>

    <div class="headline">All-in-one recon for <em>bug bounty hunters</em>.</div>

    <div class="props">
      <span>11 scanners</span>
      <span class="dot"></span>
      <span>real-time CertStream</span>
      <span class="dot"></span>
      <span>scope sync</span>
    </div>

    <div class="footer">
      <span class="url">app.bugrecon.me</span>
      <span class="tagline">Built by hunters, for hunters.</span>
    </div>
  </div>
</body>
</html>
